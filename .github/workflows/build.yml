name: Build and push

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Dockerfile

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/sietsewer/pg-ponderduck:pg18-duckdb1.1.1
            ghcr.io/sietsewer/pg-ponderduck:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
